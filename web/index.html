<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nestara — Front Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --brand:#6AA7FF; --brand-deep:#3F7DE0; --brand-ink:#0F1E3D;
    --canvas:#F4F7FC; --surface:#FFFFFF; --line:#E4EAF3;
    --muted:#5B6B85; --ok:#16A06A; --ok-soft:#E5F5EE; --warn:#C77A12;
    --bubble-user:#0F1E3D; --bubble-bot:#FFFFFF;
    --shadow:0 1px 2px rgba(15,30,61,.06),0 8px 30px rgba(15,30,61,.06);
    --radius:18px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;font-family:Inter,system-ui,sans-serif;color:var(--brand-ink);
    background:
      radial-gradient(1200px 600px at 80% -10%, #E9F1FF 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #EAF6F1 0%, transparent 55%),
      var(--canvas);
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .app{
    width:100%;max-width:760px;height:min(88vh,860px);background:var(--surface);
    border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;overflow:hidden;
  }

  /* Header */
  header{
    padding:18px 22px;display:flex;align-items:center;gap:14px;
    background:linear-gradient(115deg,var(--brand-deep),var(--brand) 70%);
    color:#fff;position:relative;
  }
  .mark{
    width:40px;height:40px;border-radius:12px;display:grid;place-items:center;
    background:rgba(255,255,255,.16);backdrop-filter:blur(6px);
    font-family:Sora;font-weight:700;font-size:20px;letter-spacing:-.5px;
  }
  .title{display:flex;flex-direction:column;line-height:1.15}
  .title b{font-family:Sora;font-weight:600;font-size:17px;letter-spacing:-.2px}
  .title span{font-size:12.5px;opacity:.85}
  .spacer{flex:1}
  /* Identity chip — the signature element: mirrors the agent's auth state */
  .chip{
    display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:500;
    background:rgba(255,255,255,.16);padding:7px 12px;border-radius:999px;
    border:1px solid rgba(255,255,255,.22);white-space:nowrap;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:#FFD27A;box-shadow:0 0 0 3px rgba(255,210,122,.25)}
  .chip.verified .dot{background:#7CF0B6;box-shadow:0 0 0 3px rgba(124,240,182,.25)}
  .reset{
    appearance:none;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;
    font:inherit;font-size:12.5px;padding:7px 12px;border-radius:999px;cursor:pointer;transition:background .15s;
  }
  .reset:hover{background:rgba(255,255,255,.14)}

  /* Messages */
  .stream{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
  .row{display:flex;gap:10px;max-width:86%}
  .row.user{align-self:flex-end;flex-direction:row-reverse}
  .avatar{
    flex:none;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
    font-size:13px;font-weight:600;font-family:Sora;margin-top:2px;
  }
  .row.bot .avatar{background:#EAF1FF;color:var(--brand-deep)}
  .row.user .avatar{background:var(--brand-ink);color:#fff}
  .bubble{
    padding:12px 15px;border-radius:var(--radius);font-size:14.5px;line-height:1.5;
    box-shadow:var(--shadow);
  }
  .row.bot .bubble{background:var(--bubble-bot);border:1px solid var(--line);border-top-left-radius:6px}
  .row.user .bubble{background:var(--bubble-user);color:#fff;border-top-right-radius:6px}
  .bubble a{color:var(--brand-deep);font-weight:500}
  .row.user .bubble a{color:#BFD6FF}
  .bubble code{background:rgba(15,30,61,.06);padding:1px 5px;border-radius:5px;font-size:13px}

  /* Typing */
  .typing{display:inline-flex;gap:4px;align-items:center;padding:4px 2px}
  .typing i{width:7px;height:7px;border-radius:50%;background:#A9B7CE;animation:b 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.18s}.typing i:nth-child(3){animation-delay:.36s}
  @keyframes b{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-4px);opacity:1}}

  /* Quick prompts */
  .quick{display:flex;flex-wrap:wrap;gap:8px;padding:0 22px 6px}
  .quick button{
    font:inherit;font-size:12.5px;color:var(--brand-deep);background:#EEF4FF;
    border:1px solid #DBE6FB;padding:7px 12px;border-radius:999px;cursor:pointer;transition:.15s;
  }
  .quick button:hover{background:#E2ECFF;transform:translateY(-1px)}

  /* Composer */
  .composer{padding:14px 16px;border-top:1px solid var(--line);background:#FBFCFE}
  .box{display:flex;align-items:flex-end;gap:8px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:6px 6px 6px 6px;box-shadow:var(--shadow)}
  .box:focus-within{border-color:var(--brand);box-shadow:0 0 0 4px rgba(106,167,255,.16)}
  .icon-btn{flex:none;width:38px;height:38px;border-radius:11px;border:none;background:#F0F4FB;color:var(--muted);cursor:pointer;display:grid;place-items:center;transition:.15s}
  .icon-btn:hover{background:#E6EDF8;color:var(--brand-deep)}
  textarea{
    flex:1;border:none;outline:none;resize:none;font:inherit;font-size:14.5px;
    color:var(--brand-ink);background:transparent;max-height:120px;padding:9px 4px;line-height:1.45;
  }
  .send{flex:none;width:40px;height:40px;border-radius:12px;border:none;cursor:pointer;display:grid;place-items:center;
    background:linear-gradient(120deg,var(--brand-deep),var(--brand));color:#fff;transition:.15s}
  .send:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .send:disabled{opacity:.45;cursor:not-allowed;transform:none}
  .foot{font-size:11px;color:var(--muted);text-align:center;margin-top:9px}
  .foot b{color:var(--brand-ink);font-weight:500}
  .attached{font-size:12px;color:var(--brand-deep);padding:2px 22px 0;display:none}

  @media (max-width:560px){
    body{padding:0}.app{height:100vh;border-radius:0;border:none;max-width:100%}
    .row{max-width:92%}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto}}
</style>
</head>
<body>
  <div class="app" role="application" aria-label="Nestara assistant">
    <header>
      <div class="mark">N</div>
      <div class="title"><b>Nestara</b><span>Home-loan front desk</span></div>
      <div class="spacer"></div>
      <span class="chip" id="chip" title="Your verification status"><span class="dot"></span><span id="chipText">Guest</span></span>
      <button class="reset" id="reset" title="Start a new conversation">Reset</button>
    </header>

    <div class="stream" id="stream" aria-live="polite"></div>

    <div class="quick" id="quick">
      <button data-q="Hi, I'm an existing customer.">I'm an existing customer</button>
      <button data-q="I'm interested in a new home loan.">I want a home loan</button>
      <button data-q="I'd like to talk to an adviser.">Talk to an adviser</button>
      <button data-q="What rates and products do you offer?">Products &amp; rates</button>
    </div>

    <div class="attached" id="attached"></div>
    <div class="composer">
      <div class="box">
        <input type="file" id="file" hidden />
        <button class="icon-btn" id="attach" title="Attach a document" aria-label="Attach a document">📎</button>
        <textarea id="input" rows="1" placeholder="Type a message…" autocomplete="off"></textarea>
        <button class="send" id="send" title="Send" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 12l16-8-6 16-3-7-7-1z" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="foot">Nestara is a loan platform, not a lender · <b>Demo</b> — sample data &amp; mocked OTP</div>
    </div>
  </div>

<script>
(function(){
  const stream=document.getElementById('stream'), input=document.getElementById('input'),
        send=document.getElementById('send'), quick=document.getElementById('quick'),
        chip=document.getElementById('chip'), chipText=document.getElementById('chipText'),
        resetBtn=document.getElementById('reset'), fileInput=document.getElementById('file'),
        attachBtn=document.getElementById('attach'), attached=document.getElementById('attached');
  let sessionId=null, busy=false, pendingFile=null;

  // ---- rendering -----------------------------------------------------------
  function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  function fmt(t){
    let h=esc(t);
    h=h.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
    h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
    h=h.replace(/(https?:\/\/[^\s)]+)(?![^<]*>)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
    return h.replace(/\n/g,'<br>');
  }
  function add(role,text){
    const row=document.createElement('div'); row.className='row '+role;
    row.innerHTML=`<div class="avatar">${role==='bot'?'N':'You'}</div><div class="bubble">${fmt(text)}</div>`;
    stream.appendChild(row); stream.scrollTop=stream.scrollHeight; return row;
  }
  function typing(){
    const row=document.createElement('div'); row.className='row bot';
    row.innerHTML=`<div class="avatar">N</div><div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div>`;
    stream.appendChild(row); stream.scrollTop=stream.scrollHeight; return row;
  }

  // Heuristic identity chip — reflects how the conversation is progressing.
  function updateChip(userText,botText){
    const b=(botText||'').toLowerCase();
    const m=botText && botText.match(/\b(?:Hi|Hello|Welcome back),?\s+([A-Z][a-z]+)/);
    if(m){chip.classList.add('verified'); chipText.textContent=m[1]+' · verified'; return;}
    if(b.includes('verified')||b.includes("you're all set")||b.includes('thanks for verifying')){
      chip.classList.add('verified'); chipText.textContent='Verified';
    }
  }

  // ---- networking ----------------------------------------------------------
  async function sendMessage(text){
    if(busy||!text.trim()) return;
    busy=true; send.disabled=true; quick.style.display='none';
    add('user', text);
    input.value=''; input.style.height='auto';
    const t=typing();
    try{
      const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({session_id:sessionId, message:text})});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const data=await res.json(); sessionId=data.session_id;
      t.remove(); const row=add('bot', data.reply||'…');
      updateChip(text, data.reply);
    }catch(err){
      t.remove();
      add('bot',"I couldn't reach the server. Make sure it's running (`uvicorn app.main:app --reload`) and your API key is set, then try again.");
    }finally{
      busy=false; send.disabled=false; input.focus();
    }
  }

  // ---- composer behaviour --------------------------------------------------
  input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';});
  input.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}});
  send.addEventListener('click',submit);
  function submit(){
    let text=input.value.trim();
    if(pendingFile){ text=(text?text+' — ':'')+'I’ve uploaded my '+pendingFile; pendingFile=null; attached.style.display='none'; }
    if(text) sendMessage(text);
  }
  quick.addEventListener('click',e=>{ const b=e.target.closest('button'); if(b) sendMessage(b.dataset.q); });

  attachBtn.addEventListener('click',()=>fileInput.click());
  fileInput.addEventListener('change',()=>{
    if(fileInput.files.length){ pendingFile=fileInput.files[0].name;
      attached.textContent='📎 Ready to send: '+pendingFile; attached.style.display='block'; input.focus();
      fileInput.value=''; }
  });

  resetBtn.addEventListener('click',async()=>{
    if(sessionId){ try{ await fetch('/api/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId})}); }catch(e){} }
    sessionId=null; stream.innerHTML=''; chip.classList.remove('verified'); chipText.textContent='Guest';
    quick.style.display='flex'; greet();
  });

  function greet(){
    add('bot',"Hi! I'm Nestara's assistant. I can help with your home-loan application, documents, or finding the right loan.\n\nIf you're an existing customer, share the **mobile number** registered with us. Otherwise, tell me what you're looking for.");
  }
  greet(); input.focus();
})();
</script>
</body>
</html>
